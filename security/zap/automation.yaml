env:
  vars:
    AUTH_TOKEN: "${AUTH_TOKEN}"
  contexts:
    - name: "zerodast-target"
      urls:
        - "http://untrusted-app:8080"
      includePaths:
        - "http://untrusted-app:8080.*"
      excludePaths:
        - "http://untrusted-app:8080/api-docs.*"
      technology:
        include:
          - "Db.PostgreSQL"
          - "Language.JavaScript"
  parameters:
    failOnError: true
    progressToStdout: true

jobs:
  - type: replacer
    parameters:
      deleteAllRules: true
    rules:
      - description: "Auth token injection"
        matchType: "REQ_HEADER"
        matchString: "Authorization"
        replacementString: "Bearer ${AUTH_TOKEN}"

  - type: openapi
    parameters:
      apiUrl: "http://untrusted-app:8080/v3/api-docs"
      targetUrl: "http://untrusted-app:8080"
      context: "zerodast-target"

  - type: requestor
    requests:
      - url: "http://untrusted-app:8080/api/debug/error"
        method: "GET"
      - url: "http://untrusted-app:8080/api/search/preview?q=test"
        method: "GET"

  - type: spider
    parameters:
      context: "zerodast-target"
      url: "http://untrusted-app:8080"
      maxDuration: 2
      maxDepth: 5
      maxChildren: 10

  - type: passiveScan-wait
    parameters:
      maxDuration: 2

  - type: activeScan
    parameters:
      context: "zerodast-target"
      maxRuleDurationInMins: 5
      maxScanDurationInMins: 30
      threadPerHost: 4
      delayInMs: 50
    policyDefinition:
      defaultStrength: medium
      defaultThreshold: low
      rules:
        - id: 40018
          name: "SQL Injection"
          threshold: low
          strength: insane
        - id: 40022
          name: "SQL Injection - PostgreSQL"
          threshold: low
          strength: insane
        - id: 40012
          name: "Cross Site Scripting (Reflected)"
          threshold: low
          strength: insane
        - id: 40014
          name: "Cross Site Scripting (Persistent)"
          threshold: medium
          strength: high

  - type: report
    parameters:
      template: "traditional-json"
      reportDir: "/zap/wrk"
      reportFile: "zap-report.json"

  - type: report
    parameters:
      template: "traditional-html"
      reportDir: "/zap/wrk"
      reportFile: "zap-report.html"
