name: ZeroDAST PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: zerodast-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run ZeroDAST PR scan
        env:
          ZERODAST_MODE: pr
        run: |
          chmod +x zerodast/run-scan.sh
          zerodast/run-scan.sh

      - name: Upload ZeroDAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zerodast-pr-report
          path: zerodast/reports
          if-no-files-found: warn

      - name: Write summary
        if: always()
        run: |
          for f in zerodast/reports/summary.md zerodast/reports/operational-reliability.md zerodast/reports/result-state.md zerodast/reports/api-inventory.md; do
            if [ -f "$f" ]; then
              cat "$f" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if [ ! -f zerodast/reports/summary.md ]; then
            echo 'ZeroDAST summary not produced.' >> "$GITHUB_STEP_SUMMARY"
          fi
