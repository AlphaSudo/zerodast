name: Petclinic T4 Metadata

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Optional override for the Petclinic commit SHA
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - '.github/workflows/petclinic-t4-*'
      - 'benchmarks/petclinic/**'
      - 'docs/benchmarks/petclinic-t4-design.md'

permissions:
  contents: read

concurrency:
  group: petclinic-t4-metadata-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-metadata:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 1

      - name: Prepare metadata artifact
        run: |
          mkdir -p artifacts
          TARGET_SHA="${{ inputs.target_sha }}"
          if [ -z "$TARGET_SHA" ]; then
            TARGET_SHA="155f89a08828386493c27b5584cd2a93d0dcfc39"
          fi
          cat > artifacts/petclinic-t4-input.json <<EOF
          {
            "repo": "https://github.com/spring-petclinic/spring-petclinic-rest.git",
            "sha": "${TARGET_SHA}",
            "zapVersion": "2.17.0"
          }
          EOF

      - name: Upload metadata artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: petclinic-t4-input
          path: artifacts/petclinic-t4-input.json
          retention-days: 1
