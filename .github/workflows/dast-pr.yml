name: DAST PR Scan

on:
  workflow_run:
    workflows: ["CI Tests"]
    types: [completed]

concurrency:
  group: dast-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  dast-scan:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    outputs:
      pr_number: ${{ steps.pr_meta.outputs.pr_number }}
      parse_exit: ${{ steps.parse_report.outputs.parse_exit }}
    steps:
      - name: Capture PR metadata
        id: pr_meta
        run: |
          echo "pr_number=${{ github.event.workflow_run.pull_requests[0].number }}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Checkout trusted main
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Download PR artifact bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: pr-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts

      - name: Cache pglast wheel
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pglast-7.13-${{ runner.os }}

      - name: Install overlay validator dependency
        run: python3 -m pip install pglast==7.13

      - name: Validate overlay artifact
        run: |
          if [ -f artifacts/overlay.sql ]; then
            python3 db/seed/validate_overlay.py artifacts/overlay.sql
          fi

      - name: Pre-pull trusted images
        run: |
          docker pull postgres:16-alpine &
          docker pull zaproxy/zap-stable:2.17.0 &
          docker pull node:20-alpine &
          wait

      - name: Load demo image
        run: docker load -i artifacts/demo-app.tar

      - name: Generate ZAP config
        run: bash scripts/generate-delta-scan.sh artifacts/delta-endpoints.txt security/zap/automation.yaml

      - name: Prepare post-scan hook
        run: |
          first_line=$(head -n 1 artifacts/delta-endpoints.txt | tr -d '\r')
          require_admin=false
          if [ "$first_line" = "FULL" ] || grep -Eq '^/api/users(/|$|:)' artifacts/delta-endpoints.txt; then
            require_admin=true
          fi
          cat <<'EOF' > /tmp/post-scan.sh
          #!/usr/bin/env bash
          set -euo pipefail
          EOF
          if [ "$require_admin" = "true" ]; then
            cat <<'EOF' >> /tmp/post-scan.sh
          bash scripts/verify-admin-coverage.sh reports/zap-report.json
          EOF
          else
            cat <<'EOF' >> /tmp/post-scan.sh
          echo "Skipping admin route coverage verification for non-admin delta scope"
          EOF
          fi
          if [ "$first_line" = "FULL" ]; then
            cat <<'EOF' >> /tmp/post-scan.sh
            bash scripts/verify-canaries.sh reports/zap-report.json
          EOF
          fi
          chmod +x /tmp/post-scan.sh

      - name: Run isolated DAST environment
        env:
          APP_IMAGE: zerodast-demo-app:${{ steps.pr_meta.outputs.head_sha }}
          SCHEMA_SQL: ${{ github.workspace }}/db/seed/schema.sql
          MOCK_DATA_SQL: ${{ github.workspace }}/db/seed/mock_data.sql
          OVERLAY_SQL: ${{ github.workspace }}/artifacts/overlay.sql
          ZAP_CONFIG_PATH: /tmp/zap-config.yaml
          AUTH_BOOTSTRAP_MODE: adapter
          AUTH_ADAPTER_SCRIPT: ${{ github.workspace }}/scripts/auth-adapters/json-token-login.sh
          AUTH_TOKEN_PATH: /tmp/zap-auth-token.txt
          ADMIN_AUTH_TOKEN_PATH: /tmp/zap-auth-token-admin.txt
          RUN_AUTHZ_NETWORK: 'true'
          POST_SCAN_SCRIPT: /tmp/post-scan.sh
          REPORTS_DIR: ${{ github.workspace }}/reports
        run: bash security/run-dast-env.sh

      - name: Upload DAST report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dast-report
          path: reports
          retention-days: 30
          if-no-files-found: warn

      - name: Parse report
        if: always()
        id: parse_report
        run: |
          set +e
          if [ -f reports/zap-report.json ]; then
            node scripts/parse-zap-report.js reports/zap-report.json | tee report-summary.md
            status=${PIPESTATUS[0]}
          else
            echo 'ZAP report was not produced.' | tee report-summary.md
            status=1
          fi
          echo "parse_exit=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload report summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dast-summary
          path: report-summary.md
          retention-days: 30
          if-no-files-found: error

  report-results:
    if: always() && needs.dast-scan.result != 'skipped'
    needs: dast-scan
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: main
          fetch-depth: 1

      - name: Download report summary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dast-summary
          path: .

      - name: Comment on PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          PR_NUMBER: ${{ needs.dast-scan.outputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const body = [
              '## ZeroDAST PR Scan',
              '',
              fs.readFileSync('report-summary.md', 'utf8'),
            ].join('\n');
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const marker = '## ZeroDAST PR Scan';
            const existing = comments.find((comment) => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
