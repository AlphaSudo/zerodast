name: Fullstack FastAPI Auth Profile

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fullstack-fastapi-auth-profile.yml'
      - 'benchmarks/fullstack-fastapi-template/run-auth-profile.sh'
      - 'docs/benchmarks/full-stack-fastapi-template.md'
      - 'docs/CHECKMARX_PARITY_CHECKLIST.md'
      - 'docs/CURRENT_CAPABILITIES.md'
      - 'scripts/auth-adapters/form-urlencoded-token-login.sh'

jobs:
  fullstack-fastapi-auth-profile:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout ZeroDAST
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 1

      - name: Clone frozen FastAPI target
        env:
          TARGET_SHA: bba8d07c0cb4ac0e38a99d1de38090048fab8dee
        run: |
          git init fullstack-fastapi-benchmark
          cd fullstack-fastapi-benchmark
          git remote add origin https://github.com/fastapi/full-stack-fastapi-template.git
          git fetch --depth 1 origin "$TARGET_SHA"
          git checkout --detach FETCH_HEAD

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Run Fullstack FastAPI auth profile
        env:
          TARGET_DIR: ${{ github.workspace }}/fullstack-fastapi-benchmark
          CONTAINER_ENGINE_BIN: docker
        run: bash benchmarks/fullstack-fastapi-template/run-auth-profile.sh

      - name: Write step summary
        run: cat benchmarks/fullstack-fastapi-template/out/auth-profile/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Fullstack FastAPI auth profile artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fullstack-fastapi-auth-profile
          path: |
            benchmarks/fullstack-fastapi-template/out/auth-profile/summary.md
            benchmarks/fullstack-fastapi-template/out/auth-profile/metrics.json
